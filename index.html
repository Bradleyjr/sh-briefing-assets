<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Summit House — Daily Industry Briefing</title>
<style>
:root {
  color-scheme: light;
  --ink: #060606;
  --archive: #f6f6f6;
  --grain: #e7e7e7;
  --graphite: #4c4c4c;
  --blueprint: #7aa0ac;
  --midnight: #375058;
  --carmine: #9e2b25;
  --paper: #fbfaf8;
  --hair: rgba(76,76,76,.16);
  --serif: "IvyPresto Display","IvyPresto Headline",ivypresto-display,"Didot","Bodoni 72","Playfair Display",Georgia,"Times New Roman",serif;
  --sans: "Inter Tight",InterTight,Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans); background: var(--archive); color: var(--ink);
  line-height: 1.5; -webkit-font-smoothing: antialiased;
}

/* ---- Masthead ---- */
.masthead { background: var(--ink); color: #fff; padding: 26px 0 24px; }
.masthead .inner { max-width: 940px; margin: 0 auto; padding: 0 24px; }
.logo { height: 30px; width: auto; display: block; margin-bottom: 20px; }
.logo path { fill: #fff; }
.mast-row { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  border-top: 1px solid rgba(255,255,255,.16); padding-top: 16px; }
.mast-kicker { font-size: 11px; letter-spacing: 3.5px; text-transform: uppercase; color: #c9c4bb; font-weight: 500; }
.mast-date { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #8f8a82; }

.wrap { max-width: 940px; margin: 0 auto; padding: 34px 24px 70px; }
h1.headline {
  font-family: var(--serif); font-weight: 300; font-size: 44px; line-height: 1.04;
  letter-spacing: -0.5px; color: var(--ink); max-width: 16ch;
}
.lede { font-size: 14px; color: var(--graphite); margin-top: 14px; max-width: 56ch; }

/* ---- Tabs ---- */
.tabs { display: flex; flex-wrap: wrap; gap: 2px; margin: 30px 0 26px;
  border-bottom: 1px solid var(--hair); }
.tab { appearance: none; border: none; background: transparent; cursor: pointer; font-family: var(--sans);
  font-size: 11.5px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--graphite);
  padding: 11px 14px; position: relative; white-space: nowrap; transition: color .15s; }
.tab:hover { color: var(--ink); }
.tab.active { color: var(--ink); }
.tab.active::after { content: ""; position: absolute; left: 12px; right: 12px; bottom: -1px; height: 2px;
  background: var(--carmine); }
.tab .cnt { font-size: 10px; color: var(--blueprint); margin-left: 6px; font-weight: 700; vertical-align: super; }

/* ---- Agency head ---- */
.agency-head { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--hair); }
.agency-head h2 { font-family: var(--serif); font-weight: 300; font-size: 30px; letter-spacing: -0.3px; }
.agency-head .disc { font-size: 13px; color: var(--graphite); margin-top: 6px; max-width: 64ch; }

.group-label { font-family: var(--sans); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--carmine); font-weight: 700; margin: 34px 0 14px; display: flex; align-items: center; gap: 12px; }
.group-label::after { content: ""; flex: 1; height: 1px; background: var(--hair); }

/* ---- Cards ---- */
.card { background: var(--paper); border: 1px solid var(--hair); border-radius: 3px;
  padding: 20px 22px; margin-bottom: 14px; }
.card .meta { font-size: 10.5px; color: var(--graphite); font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.2px; margin-bottom: 9px; }
.card h3 { font-family: var(--serif); font-weight: 400; font-size: 21px; line-height: 1.22; margin-bottom: 9px; letter-spacing: -0.2px; }
.card h3 a { color: var(--ink); text-decoration: none; background-image: linear-gradient(var(--carmine),var(--carmine));
  background-size: 0% 1px; background-repeat: no-repeat; background-position: 0 100%; transition: background-size .2s; }
.card h3 a:hover { color: var(--carmine); background-size: 100% 1px; }
.card p { font-size: 14px; color: #2b2a27; margin-bottom: 13px; }
.why { font-size: 13.5px; font-style: italic; color: var(--graphite);
  border-left: 2px solid var(--carmine); padding: 1px 0 1px 14px; }

.fb { display: flex; align-items: center; gap: 8px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--hair); flex-wrap: wrap; }
.fb-q { font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--graphite); font-weight: 700; margin-right: 2px; }
.fb-btn { appearance: none; cursor: pointer; font-family: var(--sans); font-size: 11px; font-weight: 600;
  letter-spacing: .3px; padding: 5px 12px; border-radius: 999px; border: 1px solid var(--hair);
  background: transparent; color: var(--graphite); transition: all .15s; }
.fb-btn:hover { border-color: var(--graphite); color: var(--ink); }
.fb-btn.up.active { background: var(--midnight); border-color: var(--midnight); color: #fff; }
.fb-btn.down.active { background: var(--carmine); border-color: var(--carmine); color: #fff; }
.fb-thanks { font-size: 11px; font-style: italic; color: var(--midnight); }
footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--hair);
  font-size: 11px; letter-spacing: .3px; color: var(--graphite); text-align: center; line-height: 1.7; }
footer .mark { font-family: var(--serif); font-style: italic; color: var(--ink); }
.hidden { display: none; }
</style>
</head>

// ---- Config (set after deploying the Apps Script web app) ----
// Paste the web app /exec URL here to send every vote to the shared Google Sheet.
const FEEDBACK_URL = "";

// ---- Feedback loop (trains future editions) ----
function slug(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,48); }
function fbStore(){ try { return JSON.parse(localStorage.getItem("sh_brief_fb")||"{}"); } catch(e){ return {}; } }
function fbSave(o){ try { localStorage.setItem("sh_brief_fb", JSON.stringify(o)); } catch(e){} }
function recordFeedback(fid, agency, title, source, vote){
  const store = fbStore();
  const prev = store[fid] && store[fid].vote;
  store[fid] = { agency: agency, title: title, source: source, vote: (prev===vote? null : vote), ts: Date.now() };
  fbSave(store);
  // Send to the shared Google Sheet (via the Apps Script web app) so the daily
  // run can read aggregated signal and tune sources/topics per agency over time.
  if (FEEDBACK_URL) {
    try {
      const body = new URLSearchParams({ agency: agency, title: title, source: source||"", vote: store[fid].vote||"clear", ts: String(Date.now()) });
      fetch(FEEDBACK_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: body.toString() });
    } catch(e) {}
  }
  return store[fid].vote;
}

function cardHTML(it, agencyId) {
  const fid = agencyId + "|" + slug(it.t);
  const cur = (fbStore()[fid]||{}).vote;
  return '<article class="card">' +
    '<div class="meta">' + it.m + '</div>' +
    '<h3><a href="' + it.u + '" target="_blank" rel="noopener">' + it.t + '</a></h3>' +
    '<p>' + it.p + '</p>' +
    '<div class="why">' + it.w + '</div>' +
    '<div class="fb" data-fid="' + fid + '" data-agency="' + agencyId + '" data-src="' + (it.m||"") + '" data-title="' + it.t.replace(/"/g,"&quot;") + '">' +
      '<span class="fb-q">Useful for your team?</span>' +
      '<button class="fb-btn up' + (cur==="up"?" active":"") + '" data-v="up">More like this</button>' +
      '<button class="fb-btn down' + (cur==="down"?" active":"") + '" data-v="down">Less</button>' +
      '<span class="fb-thanks"></span>' +
    '</div>' +
  '</article>';
}

function render(id) {
  const ag = AGENCIES.find(a => a.id === id);
  let html = '<div class="agency-head"><h2>' + ag.name + '</h2><div class="disc">' + ag.disc + '</div></div>';
  if (id === "all") {
    AGENCIES.filter(a => a.id !== "all").forEach(a => {
      html += '<div class="group-label">' + a.name + '</div>';
      (ITEMS[a.id] || []).forEach(it => html += cardHTML(it, a.id));
    });
  } else {
    (ITEMS[id] || []).forEach(it => html += cardHTML(it, id));
  }
  contentEl.innerHTML = html;
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.dataset.id === id));
  try { localStorage.setItem("sh_brief_tab", id); } catch(e) {}
  window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
}

AGENCIES.forEach(a => {
  const b = document.createElement("button");
  b.className = "tab"; b.dataset.id = a.id;
  const cnt = a.id === "all" ? "" : '<span class="cnt">' + (ITEMS[a.id]||[]).length + '</span>';
  b.innerHTML = a.name + cnt;
  b.onclick = () => render(a.id);
  tabsEl.appendChild(b);
});

contentEl.addEventListener("click", function(e){
  const btn = e.target.closest(".fb-btn");
  if (!btn) return;
  const row = btn.closest(".fb");
  const vote = recordFeedback(row.dataset.fid, row.dataset.agency, row.dataset.title, row.dataset.src, btn.dataset.v);
  row.querySelectorAll(".fb-btn").forEach(b => b.classList.toggle("active", b.dataset.v === vote));
  row.querySelector(".fb-thanks").textContent =
    vote === "up" ? "Got it — more like this." : vote === "down" ? "Noted — we'll dial it back." : "";
});

let start = "all";
try { const s = localStorage.getItem("sh_brief_tab"); if (s && AGENCIES.some(a=>a.id===s)) start = s; } catch(e) {}
render(start);
